services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ..:/app
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      TRUST_PROXY: 1
    command: sh -lc "npm ci && npm run start:prod"
    restart: unless-stopped

  caddy:
    image: caddy:2.7
    ports:
      - "80:80"
      - "443:443"
    environment:
      PORTAL_DOMAIN: portal.tld
      PORTAL_UPSTREAM: app:3000
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
