<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PORTAL Global | Offline</title>
  <style>
    :root { --bg:#0b1112; --card:#121c1f; --ink:#f3f7f5; --muted:#9bb0b0; --border:rgba(255,255,255,0.08); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui; background:var(--bg); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { max-width:480px; padding:24px; border-radius:16px; border:1px solid var(--border); background:var(--card); }
    h1 { margin:0 0 8px; font-size:24px; }
    p { margin:0; color:var(--muted); line-height:1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>PORTAL Global is not available right now. Check your connection and try again.</p>
  </div>
</body>
</html>
