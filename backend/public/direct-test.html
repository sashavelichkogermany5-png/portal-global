<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL GLOBAL - Direct Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
            padding: 40px;
        }
        h1 { margin-bottom: 30px; font-size: 28px; }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: linear-gradient(135deg, #11998e, #38ef7d); color: white; }
        .btn-error { background: linear-gradient(135deg, #eb3349, #f45c43); color: white; }
        .btn-warning { background: linear-gradient(135deg, #f2994a, #f2c94c); color: #333; }
        
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 10000;
        }
        .toast {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 16px 24px;
            margin-top: 12px;
            min-width: 280px;
            animation: slideIn 0.4s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        #theme-status {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="theme-status">🌙 Dark Mode</div>
    
    <h1>🎯 PORTAL GLOBAL - Direct Test</h1>
    
    <button class="btn btn-success" onclick="toast('✓ Success', 'Alles funktioniert!', 'success')">✓ Success</button>
    <button class="btn btn-error" onclick="toast('✕ Error', 'Etwas ist schiefgelaufen', 'error')">✕ Error</button>
    <button class="btn btn-warning" onclick="toast('⚠ Warning', 'Bitte beachten!', 'warning')">⚠ Warning</button>
    <button class="btn btn-primary" onclick="toast('ℹ Info', 'Nur zur Information', 'info')">ℹ Info</button>
    <button class="btn btn-primary" onclick="toggleTheme()">🌙 Theme Toggle</button>
    
    <h2 style="margin: 40px 0 20px;">Modal Test</h2>
    <button class="btn btn-primary" onclick="openModal()">📊 Open Modal</button>
    
    <div id="toast-container"></div>
    
    <!-- Modal -->
    <div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center;">
        <div style="background:#1a1a2e; border:1px solid rgba(255,255,255,0.2); border-radius:16px; padding:30px; max-width:450px; width:90%;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0;">🧠 AI Analyse</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:#fff; font-size:28px; cursor:pointer;">×</button>
            </div>
            <div id="modal-content">
                <p>Projekt-Analyse wird geladen...</p>
            </div>
            <div style="margin-top:20px; text-align:right;">
                <button onclick="closeModal()" class="btn" style="background:rgba(255,255,255,0.1); color:#fff;">Schließen</button>
            </div>
        </div>
    </div>
    
    <script>
        function toast(title, message, type) {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = 'toast';
            div.innerHTML = `<strong>${title}</strong><br><span style="opacity:0.8">${message}</span>`;
            container.appendChild(div);
            
            setTimeout(() => {
                div.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => div.remove(), 300);
            }, 3500);
        }
        
        let isDark = true;
        function toggleTheme() {
            isDark = !isDark;
            document.body.style.background = isDark 
                ? 'linear-gradient(135deg, #1a1a2e, #16213e)' 
                : 'linear-gradient(135deg, #f5f7fa, #c3cfe2)';
            document.body.style.color = isDark ? '#fff' : '#333';
            document.getElementById('theme-status').textContent = isDark ? '🌙 Dark Mode' : '☀️ Light Mode';
            toast('Theme', isDark ? 'Dunkel' : 'Hell', 'info');
        }
        
        function openModal() {
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('modal-content').innerHTML = '<p>📊 Analysiere Projekt...</p><p style="margin-top:10px; opacity:0.6;">(Dies ist ein Test - kein echter API-Call)</p>';
        }
        
        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }
        
        document.getElementById('modal-overlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        console.log('✅ PORTAL GLOBAL Test geladen!');
    </script>
</body>
</html>
