<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL Global | Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="manifest" href="/static/manifest.webmanifest">
    <meta name="theme-color" content="#0b0f19">
    <style>
        :root {
            --bg: #0b1112;
            --bg-2: #0f1c1f;
            --card: #121c1f;
            --card-2: #0f171a;
            --ink: #f3f7f5;
            --muted: #9bb0b0;
            --accent: #4fb3a5;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Space Grotesk", system-ui, sans-serif;
            background: radial-gradient(circle at 15% 10%, rgba(79, 179, 165, 0.22), transparent 50%),
                radial-gradient(circle at 85% 15%, rgba(242, 196, 109, 0.15), transparent 45%),
                linear-gradient(160deg, var(--bg), var(--bg-2));
            color: var(--ink);
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .top{position:sticky;top:0;z-index:10;background:rgba(11,15,25,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}
        .top__inner{max-width:980px;margin:0 auto;padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
        .brand{color:#e9eefc;text-decoration:none;font-weight:700}
        .nav{display:flex;gap:12px;flex-wrap:wrap}
        .nav a{color:#9fb0d0;text-decoration:none;font-weight:600;font-size:14px}
        .nav a:hover{color:#e9eefc}
        .account{margin-left:auto;display:flex;align-items:center;gap:10px;color:#9fb0d0;font-size:13px}
        .plan-badge{border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
        .plan-free{border:1px solid rgba(255,255,255,.18);color:#d7dde8;background:rgba(255,255,255,.08)}
        .plan-pro{border:1px solid rgba(43,108,255,.6);color:#cfe0ff;background:rgba(43,108,255,.2)}
        .plan-business{border:1px solid rgba(148,82,255,.5);color:#eadcff;background:rgba(148,82,255,.18)}
        .account .upgrade{display:none;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;border:1px solid rgba(79,179,165,.6);color:#e9eefc;font-weight:600;font-size:12px;text-decoration:none}
        .logout{background:#11182a;border:1px solid rgba(255,255,255,.08);color:#e9eefc;border-radius:10px;padding:8px 10px;cursor:pointer}
        @media(max-width:560px){.account{margin-left:0}.logout{margin-left:0}}

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 80px;
        }

        .hero {
            display: grid;
            gap: 10px;
            margin-bottom: 28px;
        }

        .hero h1 {
            font-size: clamp(30px, 4vw, 44px);
        }

        .hero p {
            color: var(--muted);
            line-height: 1.6;
        }

        .grid {
            display: grid;
            gap: 18px;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px;
            box-shadow: var(--shadow);
            display: grid;
            gap: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 24px 46px rgba(0, 0, 0, 0.35);
        }

        .metric {
            font-size: 24px;
            font-weight: 600;
        }

        .status {
            font-size: 13px;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <header class="top">
      <div class="top__inner">
        <a class="brand" href="/">PORTAL</a>
        <nav class="nav">
          <a href="/">Home</a>
          <a href="/app">Dashboard</a>
          <a href="/pricing">Pricing</a>
          <a href="/docs">Docs</a>
          <a href="/help">Help</a>
          <a href="/cabinet">Cabinet</a>
          <a href="/admin">Admin</a>
        </nav>
        <div class="account" id="accountInfo">
          <span id="accountEmail">Loading...</span>
          <span class="plan-badge plan-free" id="accountPlan">Free</span>
          <a class="upgrade" id="upgradeLink" href="/pricing">Upgrade</a>
        </div>
        <button id="logoutBtn" class="logout">Logout</button>
      </div>
    </header>

    <div class="page">
        <section class="hero">
            <h1>Admin overview</h1>
            <p>Global metrics for users, subscriptions, and plan distribution.</p>
        </section>

        <section class="grid">
            <div class="card">
                <h2>Total users</h2>
                <div class="metric" id="totalUsers">-</div>
            </div>
            <div class="card">
                <h2>Total subscriptions</h2>
                <div class="metric" id="totalSubscriptions">-</div>
            </div>
            <div class="card">
                <h2>Projects</h2>
                <div class="metric" id="totalProjects">-</div>
            </div>
            <div class="card">
                <h2>Orders</h2>
                <div class="metric" id="totalOrders">-</div>
            </div>
        </section>

        <section class="card" style="margin-top:18px">
            <h2>Plan distribution</h2>
            <div id="planDistribution" class="status">Loading...</div>
        </section>
    </div>

    <script>
        const $ = (id) => document.getElementById(id);

        const setPlanBadge = (element, planCode, planName) => {
            if (!element) return;
            const code = String(planCode || "free").toLowerCase();
            element.textContent = planName || code.toUpperCase();
            element.classList.remove("plan-free", "plan-pro", "plan-business");
            element.classList.add(`plan-${code}`);
        };

        const loadAccount = async () => {
            try {
                const response = await fetch("/api/auth/me", { credentials: "include" });
                const body = await response.json().catch(() => ({}));
                if (!response.ok || !body.ok) {
                    window.location.href = "/login?returnUrl=/admin";
                    return;
                }
                const user = body.data?.user || {};
                const plan = body.data?.plan || {};
                $("accountEmail").textContent = user.email || "Account";
                setPlanBadge($("accountPlan"), plan.code || "free", plan.name || plan.code || "Free");
                $("upgradeLink").style.display = (plan.code || "free") === "free" ? "inline-flex" : "none";
            } catch (error) {
                window.location.href = "/login?returnUrl=/admin";
            }
        };

        const loadStats = async () => {
            try {
                const response = await fetch("/api/admin/stats", { credentials: "include" });
                if (response.status === 401 || response.status === 403) {
                    window.location.href = "/app";
                    return;
                }
                const body = await response.json().catch(() => ({}));
                if (!response.ok || !body.ok) {
                    throw new Error(body.message || body.error || "Failed to load stats");
                }
                const data = body.data || {};
                $("totalUsers").textContent = data.totalUsers ?? 0;
                $("totalSubscriptions").textContent = data.totalSubscriptions ?? 0;
                $("totalProjects").textContent = data.totalProjects ?? 0;
                $("totalOrders").textContent = data.totalOrders ?? 0;
                const distribution = (data.planDistribution || [])
                    .map((item) => `${(item.plan_code || "").toUpperCase()}: ${item.count}`)
                    .join(" | ");
                $("planDistribution").textContent = distribution || "No active subscriptions.";
            } catch (error) {
                $("planDistribution").textContent = error.message;
            }
        };

        const logoutBtn = $("logoutBtn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", async () => {
                try {
                    await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
                } catch (error) {
                    // ignore
                }
                window.location.href = "/login";
            });
        }

        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("/static/sw.js", { scope: "/" }).catch(() => {});
        }

        loadAccount();
        loadStats();
    </script>
</body>
</html>
