<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PORTAL Global</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#0b0f19">
  <style>
    :root{--bg:#0b0f19;--card:#11182a;--text:#e9eefc;--muted:#9fb0d0;--btn:#2b6cff;}
    *{box-sizing:border-box} body{margin:0;font-family:"Space Grotesk",system-ui;background:var(--bg);color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:48px 18px}
    .hero{padding:36px 22px;background:linear-gradient(180deg,rgba(43,108,255,.18),transparent);border:1px solid rgba(255,255,255,.08);border-radius:18px}
    h1{margin:0 0 10px;font-size:44px;letter-spacing:-.02em}
    p{margin:0 0 18px;color:var(--muted);font-size:16px;line-height:1.5}
    .btns{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
    a.btn{display:block;text-decoration:none;padding:16px 14px;border-radius:14px;background:var(--card);border:1px solid rgba(255,255,255,.08);color:var(--text);text-align:center;font-weight:600}
    a.btn:hover{border-color:rgba(43,108,255,.6)}
    footer{margin-top:16px;color:var(--muted);font-size:12px}
    @media (max-width:820px){.btns{grid-template-columns:1fr}}
    .install-banner{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(17,24,42,.95);border:1px solid rgba(255,255,255,.12);color:#e9eefc;padding:10px 14px;border-radius:14px;display:none;gap:10px;align-items:center;box-shadow:0 18px 40px rgba(0,0,0,.35);font-size:13px;z-index:20}
    .install-banner button{border:1px solid rgba(255,255,255,.18);background:transparent;color:#e9eefc;border-radius:10px;padding:6px 10px;cursor:pointer;font-size:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>PORTAL Global</h1>
      <p>Unified operations workspace. Dashboard, pricing, docs — all in one place.</p>
      <div class="btns">
        <a class="btn" href="/app">Open Dashboard</a>
        <a class="btn" href="/pricing">View Pricing</a>
        <a class="btn" href="/docs">Read Docs</a>
      </div>
      <footer>Tip: Install PORTAL as an app (Chrome menu -> Install app).</footer>
    </div>
  </div>
  <div class="install-banner" id="installBanner">
    <span>Install PORTAL for faster access.</span>
    <button id="installBtn" type="button">Install</button>
    <button id="installDismiss" type="button">Not now</button>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js", { scope: "/" }).catch(()=>{});
    }
  </script>
  <script src="/static/js/pwa-banner.js" defer></script>
</body>
</html>
