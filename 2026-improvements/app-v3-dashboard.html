<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTAL GLOBAL 2026</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        :root {
            --bg: #0b1112;
            --bg-2: #0f1c1f;
            --card: #121c1f;
            --card-2: #0f171a;
            --ink: #f3f7f5;
            --muted: #9bb0b0;
            --accent: #4fb3a5;
            --accent-2: #f2c46d;
            --border: rgba(255,255,255,0.08);
            --shadow: 0 20px 40px rgba(0,0,0,0.35);
            --radius: 16px;
        }
        
        [data-theme="light"] {
            --bg: #f8fafc;
            --bg-2: #f1f5f9;
            --card: #ffffff;
            --card-2: #f1f5f9;
            --ink: #0f172a;
            --muted: #64748b;
            --border: rgba(0,0,0,0.08);
            --shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, var(--bg-2) 100%);
            color: var(--ink);
            min-height: 100vh;
            transition: all 0.3s ease;
        }
        
        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 32px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
        }
        
        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #38b2ac);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .nav-links {
            display: flex;
            gap: 24px;
        }
        
        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }
        
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        /* Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #38b2ac);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79,179,165,0.3);
        }
        
        .btn-secondary {
            background: var(--card-2);
            color: var(--ink);
            border: 1px solid var(--border);
        }
        
        .btn-icon {
            width: 40px;
            height: 40px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: var(--card-2);
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: var(--card);
            transform: scale(1.05);
        }
        
        /* Main */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
        }
        
        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 16px;
        }
        
        .stat-icon.projects { background: rgba(79,179,165,0.2); }
        .stat-icon.clients { background: rgba(242,196,109,0.2); }
        .stat-icon.orders { background: rgba(139,92,246,0.2); }
        .stat-icon.ai { background: rgba(59,130,246,0.2); }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .stat-label {
            color: var(--muted);
            font-size: 14px;
        }
        
        /* Section */
        .section {
            margin-bottom: 40px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 24px;
            font-weight: 700;
        }
        
        /* Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        
        .project-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }
        
        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }
        
        .project-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .project-category {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .project-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-active { background: rgba(79,179,165,0.2); color: var(--accent); }
        .status-planning { background: rgba(242,196,109,0.2); color: var(--accent-2); }
        .status-pending { background: rgba(100,100,100,0.2); color: var(--muted); }
        
        .project-progress {
            margin: 16px 0;
        }
        
        .progress-bar {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #38b2ac);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 13px;
            color: var(--muted);
        }
        
        .project-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        
        .project-actions .btn {
            flex: 1;
            justify-content: center;
        }
        
        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .toast {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 300px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: toastIn 0.3s ease;
            box-shadow: var(--shadow);
        }
        
        .toast-success { border-left: 3px solid var(--accent); }
        .toast-error { border-left: 3px solid #ef4444; }
        .toast-info { border-left: 3px solid #3b82f6; }
        
        @keyframes toastIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 500px;
            width: 90%;
            animation: modalIn 0.3s ease;
        }
        
        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 700;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 28px;
            cursor: pointer;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--ink);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        .form-input:focus {
            border-color: var(--accent);
        }
        
        /* Login */
        .login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
        }
        
        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px;
            width: 400px;
            text-align: center;
        }
        
        .login-title {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .login-subtitle {
            color: var(--muted);
            margin-bottom: 32px;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .projects-grid { grid-template-columns: repeat(2, 1fr); }
        }
        
        @media (max-width: 640px) {
            .stats-grid { grid-template-columns: 1fr; }
            .projects-grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 16px; padding: 16px; }
            .nav-links { flex-wrap: wrap; justify-content: center; }
            main { padding: 16px; }
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--muted);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Connection status */
        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--muted);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
        }
        
        .status-dot.offline {
            background: #ef4444;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-card">
            <div class="brand" style="justify-content: center; margin-bottom: 24px;">
                <div class="brand-icon">⚡</div>
            </div>
            <h1 class="login-title">PORTAL GLOBAL</h1>
            <p class="login-subtitle">Unified Operations Platform</p>
            <form id="login-form">
                <div class="form-group">
                    <input type="email" id="login-email" class="form-input" placeholder="Email" value="demo@portal.global" required>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" class="form-input" placeholder="Password" value="demo12345" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                    Anmelden
                </button>
            </form>
            <p style="margin-top: 16px; color: var(--muted); font-size: 13px;">
                Demo: demo@portal.global / demo12345
            </p>
        </div>
    </div>

    <!-- Main App -->
    <div id="app" style="display: none;">
        <header>
            <div class="brand">
                <div class="brand-icon">⚡</div>
                <span>PORTAL</span>
            </div>
            <nav class="nav-links">
                <a href="#" class="active" data-view="dashboard">Dashboard</a>
                <a href="#" data-view="projects">Projekte</a>
                <a href="#" data-view="clients">Kunden</a>
                <a href="#" data-view="ai">KI Assistent</a>
            </nav>
            <div class="header-actions">
                <div class="connection-status">
                    <div class="status-dot" id="ws-status"></div>
                    <span id="ws-text">Verbunden</span>
                </div>
                <button class="btn-icon" onclick="toggleTheme()" title="Theme">🌙</button>
                <button class="btn-icon" onclick="logout()" title="Logout">🚪</button>
            </div>
        </header>

        <main>
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon projects">📊</div>
                    <div class="stat-value" id="stat-projects">0</div>
                    <div class="stat-label">Aktive Projekte</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon clients">👥</div>
                    <div class="stat-value" id="stat-clients">0</div>
                    <div class="stat-label">Kunden</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon orders">📦</div>
                    <div class="stat-value" id="stat-orders">0</div>
                    <div class="stat-label">Bestellungen</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon ai">🤖</div>
                    <div class="stat-value" id="stat-ai">0</div>
                    <div class="stat-label">KI Anfragen</div>
                </div>
            </div>

            <!-- Projects Section -->
            <div class="section">
                <div class="section-header">
                    <h2 class="section-title">Projekte</h2>
                    <button class="btn btn-primary" onclick="openModal('create-project')">
                        + Neues Projekt
                    </button>
                </div>
                <div class="projects-grid" id="projects-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Projekte werden geladen...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Modal</h2>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        const API = 'http://localhost:3000';
        let token = localStorage.getItem('portal_token');
        
        // Theme
        function initTheme() {
            const saved = localStorage.getItem('portal_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        }
        
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('portal_theme', next);
        }
        
        // Toast
        function toast(title, message, type = 'info') {
            const container = document.getElementById('toast-container');
            const div = document.createElement('div');
            div.className = `toast toast-${type}`;
            div.innerHTML = `<strong>${title}</strong><br><small>${message}</small>`;
            container.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
        
        // Modal
        function openModal(type, data) {
            const overlay = document.getElementById('modal-overlay');
            const title = document.getElementById('modal-title');
            const content = document.getElementById('modal-content');
            
            if (type === 'create-project') {
                title.textContent = 'Neues Projekt';
                content.innerHTML = `
                    <form id="project-form">
                        <div class="form-group">
                            <label class="form-label">Projektname</label>
                            <input type="text" class="form-input" name="name" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Kategorie</label>
                            <select class="form-input" name="category">
                                <option value="general">Allgemein</option>
                                <option value="development">Entwicklung</option>
                                <option value="design">Design</option>
                                <option value="marketing">Marketing</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <select class="form-input" name="status">
                                <option value="Planning">Planung</option>
                                <option value="active">Aktiv</option>
                                <option value="pending">Ausstehend</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Notizen</label>
                            <textarea class="form-input" name="notes" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">Erstellen</button>
                    </form>
                `;
                
                document.getElementById('project-form').onsubmit = async (e) => {
                    e.preventDefault();
                    const formData = new FormData(e.target);
                    const project = {
                        name: formData.get('name'),
                        category: formData.get('category'),
                        status: formData.get('status'),
                        notes: formData.get('notes')
                    };
                    await createProject(project);
                    closeModal();
                };
            } else if (type === 'analyze') {
                title.textContent = '🤖 KI Analyse';
                content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Analysiere...</p></div>';
                
                analyzeProject(data.id).then(result => {
                    if (result.data?.analysis) {
                        content.innerHTML = `<div style="background: var(--bg); padding: 20px; border-radius: 12px;">
                            <p style="white-space: pre-wrap;">${result.data.analysis}</p>
                        </div>`;
                    } else {
                        content.innerHTML = '<p>⚠️ Analyse nicht verfügbar</p>';
                    }
                }).catch(() => {
                    content.innerHTML = '<p>❌ Fehler bei der Analyse</p>';
                });
            }
            
            overlay.classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('active');
        }
        
        document.getElementById('modal-overlay').onclick = (e) => {
            if (e.target.id === 'modal-overlay') closeModal();
        };
        
        // API
        async function api(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            
            const res = await fetch(`${API}${endpoint}`, { ...options, headers });
            return res.json();
        }
        
        // Auth
        async function login(email, password) {
            const result = await api('/api/auth/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });
            
            if (result.token || result.accessToken) {
                token = result.token || result.accessToken;
                localStorage.setItem('portal_token', token);
                return true;
            }
            return false;
        }
        
        function logout() {
            token = null;
            localStorage.removeItem('portal_token');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
        
        // Projects
        async function loadProjects() {
            const result = await api('/api/projects');
            return result.data || [];
        }
        
        async function createProject(data) {
            const result = await api('/api/projects', {
                method: 'POST',
                body: JSON.stringify(data)
            });
            
            if (result.ok) {
                toast('✓ Erfolg', 'Projekt erstellt!', 'success');
                renderProjects();
            } else {
                toast('❌ Fehler', result.message || 'Projekt konnte nicht erstellt werden', 'error');
            }
        }
        
        async function analyzeProject(id) {
            return api(`/api/projects/${id}/analyze`);
        }
        
        function renderProjects(projects) {
            const grid = document.getElementById('projects-grid');
            
            if (!projects || projects.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 60px; color: var(--muted);">
                        <p style="font-size: 48px; margin-bottom: 16px;">📋</p>
                        <p>Keine Projekte vorhanden</p>
                        <button class="btn btn-primary" style="margin-top: 16px;" onclick="openModal('create-project')">
                            + Erstes Projekt
                        </button>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = projects.map(p => `
                <div class="project-card">
                    <div class="project-header">
                        <div>
                            <div class="project-name">${p.name}</div>
                            <div class="project-category">${p.category || 'general'}</div>
                        </div>
                        <span class="project-status status-${p.status?.toLowerCase() || 'pending'}">${p.status || 'Pending'}</span>
                    </div>
                    <div class="project-progress">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${p.progress || 0}%"></div>
                        </div>
                        <div class="progress-text">
                            <span>Fortschritt</span>
                            <span>${p.progress || 0}%</span>
                        </div>
                    </div>
                    <p style="color: var(--muted); font-size: 14px; margin-top: 12px;">
                        ${p.notes?.substring(0, 80) || 'Keine Notizen'}...
                    </p>
                    <div class="project-actions">
                        <button class="btn btn-secondary" onclick="openModal('analyze', ${JSON.stringify(p).replace(/"/g, '&quot;')})">🧠 Analyse</button>
                        <button class="btn btn-secondary">✏️</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Stats
        async function loadStats() {
            try {
                const [projects, clients, orders] = await Promise.all([
                    api('/api/projects'),
                    api('/api/clients'),
                    api('/api/orders')
                ]);
                
                document.getElementById('stat-projects').textContent = (projects.data || []).length;
                document.getElementById('stat-clients').textContent = (clients.data || []).length;
                document.getElementById('stat-orders').textContent = (orders.data || []).length;
                document.getElementById('stat-ai').textContent = '0';
            } catch (e) {
                console.error('Stats error:', e);
            }
        }
        
        // WebSocket
        function initWebSocket() {
            try {
                const ws = new WebSocket(`ws://${window.location.host}`);
                
                ws.onopen = () => {
                    document.getElementById('ws-status').classList.remove('offline');
                    document.getElementById('ws-text').textContent = 'Verbunden';
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.event === 'portal-event') {
                            const { event: type } = data;
                            if (type === 'projectCreated') {
                                toast('✓ Neues Projekt', data.data.name, 'success');
                                loadProjects().then(renderProjects);
                            } else if (type === 'projectUpdated') {
                                toast('📝 Projekt aktualisiert', data.data.name, 'info');
                            }
                        }
                    } catch (e) {}
                };
                
                ws.onclose = () => {
                    document.getElementById('ws-status').classList.add('offline');
                    document.getElementById('ws-text').textContent = 'Getrennt';
                    setTimeout(initWebSocket, 3000);
                };
            } catch (e) {
                console.error('WS error:', e);
            }
        }
        
        // Init
        async function init() {
            initTheme();
            
            if (!token) {
                document.getElementById('login-screen').style.display = 'flex';
                return;
            }
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            
            // Login form
            document.getElementById('login-form').onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                
                const success = await login(email, password);
                if (success) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    initApp();
                } else {
                    toast('❌ Fehler', 'Anmeldung fehlgeschlagen', 'error');
                }
            };
            
            initApp();
        }
        
        async function initApp() {
            const projects = await loadProjects();
            renderProjects(projects);
            loadStats();
            initWebSocket();
        }
        
        init();
    </script>
</body>
</html>
